[workspace]
authors = ["zhengzaixuexi233 <wmoyouxiang@gmail.com>"]
channels = ["conda-forge"]
name = "yolo_tool"
platforms = ["win-64", { name = "gpu-win-64", platform = "win-64", cuda = "13.0" }]
version = "0.1.0"

[tasks]
test = "pytest src/tests -q"
app = "python -m src.main"
app-qt = "python -m src.main"
check = "python -m compileall src"

[dependencies]
python = "3.12.*"

[pypi-dependencies]
torch = { version = "*", index = "https://download.pytorch.org/whl/cu130" }
torchvision = { version = "*", index = "https://download.pytorch.org/whl/cu130" }
torchaudio = { version = "*", index = "https://download.pytorch.org/whl/cu130" }
pyside6 = ">=6.10.0, <7"
pillow = ">=12.2.0, <13"
ultralytics = ">=8.4.80, <9"
opencv-python = ">=4.13.0.92, <5"
pyyaml = ">=6.0.3, <7"
scikit-learn = ">=1.9.0, <2"
psutil = ">=7.2.2, <8"
pytest = ">=9.1.1, <10"
matplotlib = ">=3.11.0, <4"
pyinstaller = ">=6.17.0, <7"
lap = ">=0.5.13, <0.6"

